name: Score Report

on:
  repository_dispatch:
    types: [quiz-completed]

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Send score to Telegram
        env:
          TELE_BOT_TOKEN: ${{ secrets.TELE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          DATE="${{ github.event.client_payload.date }}"
          CONJUGATION="${{ github.event.client_payload.conjugation }}"
          VOCAB="${{ github.event.client_payload.vocab }}"
          GRAMMAR="${{ github.event.client_payload.grammar }}"
          TOTAL="${{ github.event.client_payload.total }}"
          STREAK="${{ github.event.client_payload.streak }}"

          MESSAGE="✅ *Quiz Completed\!*

🗓 ${DATE}

📝 *Scores:*
• Conjugation: ${CONJUGATION}
• Vocabulary: ${VOCAB}
• Grammar: ${GRAMMAR}
• *Total: ${TOTAL}*

🔥 Streak: ${STREAK} day\(s\)

Keep it up, Wen\! 💪"

          curl -s -X POST "https://api.telegram.org/bot${TELE_BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="MarkdownV2"
