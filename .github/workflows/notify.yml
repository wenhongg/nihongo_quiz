name: Quiz Reminder

on:
  push:
    paths:
      - 'practice/*.html'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get new quiz file
        id: quiz
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD -- 'practice/*.html' | head -1)
          if [ -z "$FILE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          DATE=$(basename "$FILE" .html)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Send Telegram reminder
        if: steps.quiz.outputs.skip == 'false'
        env:
          TELE_BOT_TOKEN: ${{ secrets.TELE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          DATE="${{ steps.quiz.outputs.date }}"
          QUIZ_URL="https://wenhongg.github.io/nihongo_quiz/practice/${DATE}.html"
          DASHBOARD_URL="https://wenhongg.github.io/nihongo_quiz/"

          MESSAGE="📚 *Today's Japanese Quiz is Ready\!*

🗓 ${DATE}

Conjugation drills, vocab quiz, grammar review and sentence challenges are waiting for you\.

[▶️ Start Quiz](${QUIZ_URL})
[📊 Dashboard](${DASHBOARD_URL})"

          curl -s -X POST "https://api.telegram.org/bot${TELE_BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="MarkdownV2" \
            -d disable_web_page_preview="true"
